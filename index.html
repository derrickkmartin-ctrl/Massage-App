<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movement Screen">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<title>Movement Screen</title>
<style>
:root {
  --bg:       #0f0f0f;
  --surf:     #1a1a1a;
  --surf2:    #242424;
  --surf3:    #2e2e2e;
  --ink:      #f0ede8;
  --ink2:     #a09a92;
  --ink3:     #5a5550;
  --accent:   #c8b89a;
  --teal:     #7ec8b8;
  --orange:   #e8906a;
  --red:      #e06868;
  --green:    #7ec898;
  --amber:    #e8b86a;
  --purple:   #b89ae8;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.14);
  --r:        14px;
  --rsm:      8px;
  --sans:     -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --mono:     'SF Mono', 'Fira Code', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); overflow: hidden; }

/* ── LAYOUT ── */
#app { height: 100dvh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

/* ── TOP BAR ── */
.topbar {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.topbar-title { font-size: 17px; font-weight: 600; letter-spacing: -.2px; }
.topbar-step  { font-size: 12px; color: var(--ink3); font-family: var(--mono); }
.settings-btn { background: none; border: none; color: var(--ink2); font-size: 22px; cursor: pointer; padding: 4px; }

/* ── PROGRESS BAR ── */
.progress-wrap { flex-shrink: 0; height: 3px; background: var(--surf2); }
.progress-fill { height: 100%; background: var(--teal); transition: width .3s ease; }

/* ── SCROLL AREA ── */
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 24px 20px 120px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 20px max(20px, env(safe-area-inset-bottom));
  background: linear-gradient(transparent, var(--bg) 30%);
  display: flex; gap: 10px;
}
.btn-back { flex: 0 0 52px; background: var(--surf2); border: none; border-radius: var(--rsm); color: var(--ink2); font-size: 20px; cursor: pointer; }
.btn-next { flex: 1; background: var(--teal); border: none; border-radius: var(--rsm); color: #0a2820; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; letter-spacing: -.1px; }
.btn-next:disabled { background: var(--surf3); color: var(--ink3); }
.btn-generate { flex: 1; background: var(--accent); border: none; border-radius: var(--rsm); color: #1a1200; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer; }

/* ── SECTION LABELS ── */
.section-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
.screen-title  { font-size: 22px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 4px; }
.screen-sub    { font-size: 14px; color: var(--ink2); margin-bottom: 24px; line-height: 1.5; }

/* ── FIELD ── */
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; font-weight: 500; color: var(--ink2); margin-bottom: 7px; }
.field input, .field textarea {
  width: 100%; background: var(--surf); border: 1px solid var(--border2);
  border-radius: var(--rsm); color: var(--ink); font-size: 15px; font-family: var(--sans);
  padding: 11px 14px; outline: none;
}
.field textarea { min-height: 72px; resize: none; line-height: 1.5; }
.field input:focus, .field textarea:focus { border-color: var(--teal); }

/* ── CHIP GROUPS ── */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
.chip {
  background: var(--surf2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 7px 14px;
  font-size: 13px; color: var(--ink2); cursor: pointer; user-select: none;
  transition: all .15s;
}
.chip.on-clean   { background: rgba(126,200,152,.15); border-color: var(--green);  color: var(--green);  }
.chip.on-comp    { background: rgba(232,184,106,.15); border-color: var(--amber);  color: var(--amber);  }
.chip.on-dysfunc { background: rgba(224,104,104,.15); border-color: var(--red);    color: var(--red);    }
.chip.on-flag    { background: rgba(184,154,232,.15); border-color: var(--purple); color: var(--purple); }
.chip.on-info    { background: rgba(200,184,154,.15); border-color: var(--accent); color: var(--accent); }

/* ── FINDING CARDS ── */
.finding-card {
  background: var(--surf); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 14px 16px; margin-bottom: 10px;
}
.finding-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.severity-row { display: flex; gap: 8px; }
.sev-btn {
  flex: 1; background: var(--surf2); border: 1px solid var(--border2);
  border-radius: var(--rsm); padding: 8px 4px; font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center; color: var(--ink3); transition: all .15s;
}
.sev-btn.active-clean   { background: rgba(126,200,152,.18); border-color: var(--green);  color: var(--green);  }
.sev-btn.active-comp    { background: rgba(232,184,106,.18); border-color: var(--amber);  color: var(--amber);  }
.sev-btn.active-dysfunc { background: rgba(224,104,104,.18); border-color: var(--red);    color: var(--red);    }

/* ── NOTES ── */
.notes-field {
  width: 100%; background: var(--surf2); border: 1px solid var(--border);
  border-radius: var(--rsm); color: var(--ink2); font-size: 13px; font-family: var(--sans);
  padding: 10px 13px; outline: none; resize: none; margin-top: 10px;
  min-height: 54px; line-height: 1.4;
}
.notes-field:focus { border-color: var(--border2); color: var(--ink); }

/* ── CALLOUT ── */
.callout {
  background: rgba(126,200,184,.08); border: 1px solid rgba(126,200,184,.2);
  border-radius: var(--rsm); padding: 12px 14px; margin-bottom: 16px; font-size: 13px;
  color: var(--ink2); line-height: 1.5;
}
.callout.warn { background: rgba(232,144,106,.08); border-color: rgba(232,144,106,.2); }

/* ── RESULT TABS ── */
.result-tabs { display: flex; gap: 2px; background: var(--surf2); border-radius: var(--rsm); padding: 3px; margin-bottom: 20px; }
.result-tab  { flex: 1; padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 600; border-radius: var(--rsm); cursor: pointer; color: var(--ink3); transition: all .2s; }
.result-tab.active { background: var(--surf3); color: var(--ink); }
.result-panel { display: none; }
.result-panel.active { display: block; }
.result-text { font-size: 14px; line-height: 1.7; color: var(--ink2); white-space: pre-wrap; }
.result-text strong { color: var(--ink); font-weight: 600; }
.action-row { display: flex; gap: 10px; margin-top: 20px; }
.action-btn { flex: 1; background: var(--surf2); border: 1px solid var(--border2); border-radius: var(--rsm); padding: 12px; font-size: 13px; color: var(--ink2); cursor: pointer; text-align: center; }
.action-btn.primary { background: var(--teal); color: #0a2820; font-weight: 700; border: none; }

/* ── SETTINGS OVERLAY ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 100; display: none; align-items: flex-end; }
.overlay.open { display: flex; }
.overlay-panel { background: var(--surf); border-radius: var(--r) var(--r) 0 0; padding: 24px 20px max(28px, env(safe-area-inset-bottom)); width: 100%; }
.overlay-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.overlay-close { float: right; background: none; border: none; color: var(--ink2); font-size: 22px; cursor: pointer; }

/* ── SPINNER ── */
.spinner { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--ink2); font-size: 14px; }
.spin { width: 20px; height: 20px; border: 2px solid var(--surf3); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-step" id="stepLabel">Step 1 of 8</div>
      <div class="topbar-title" id="screenTitle">Client Info</div>
    </div>
    <button class="settings-btn" onclick="openSettings()">⚙︎</button>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:12.5%"></div></div>
  <div class="scroll" id="scrollArea"></div>
  <div class="bottom-nav" id="bottomNav">
    <button class="btn-back" id="btnBack" onclick="prevStep()">←</button>
    <button class="btn-next" id="btnNext" onclick="nextStep()">Continue</button>
  </div>
</div>

<!-- Settings overlay -->
<div class="overlay" id="settingsOverlay" onclick="closeSettings()">
  <div class="overlay-panel" onclick="e=>e.stopPropagation()">
    <button class="overlay-close" onclick="closeSettings()">×</button>
    <div class="overlay-title">Settings</div>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <button class="btn-next" onclick="saveKey()">Save Key</button>
  </div>
</div>

<script src="matrix-data.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════════

// State
const state = {
  step: 0,
  client: { name: '', date: '', history: '', goal: '', flags: [], complaints: '' },
  screens: {}, // { findingName: { severity: 'clean'|'comp'|'dysfunc', notes: '' } }
  result: { corrective: '', flags: '', summary: '' },
};

// ── SCREEN DEFINITIONS ────────────────────────────────────────────
// Each finding name EXACTLY matches a Clinical Decision Matrix row
const SCREENS = [
  // Step 0 — Client info (handled separately)

  { // Step 1
    id: 'posture',
    title: 'Standing Posture',
    subtitle: 'Static assessment. Observe from front, side, and behind. Client stands naturally — do not cue corrections.',
    findings: [
      'Forward head posture',
      'Rounded shoulders / protracted scapulae',
      'Thoracic kyphosis',
      'Anterior pelvic tilt',
      'Knee hyperextension',
      'Foot overpronation / arch collapse',
    ],
    conditional: false,
  },
  { // Step 2
    id: 'ohs',
    title: 'Overhead Squat',
    subtitle: '5 reps, bodyweight, arms overhead. Observe from front and side. Generate hypotheses only — run clearance tests before prescribing.',
    findings: [
      'Arms fall forward',
      'Excessive forward lean',
      'Knee valgus',
      'Heel rise',
    ],
    conditional: false,
  },
  { // Step 3
    id: 'sls',
    title: 'Single Leg Squat',
    subtitle: '5 reps each side. Observe from front. Compare L/R. Hip drop >5° or knee past midline = clinically significant.',
    findings: [
      'Ipsilateral hip drop',
      'Knee valgus on descent',
      'Trunk lateral flexion',
    ],
    conditional: false,
  },
  { // Step 4
    id: 'push',
    title: 'Push Pattern',
    subtitle: 'Assess with push-up or wall push-up. Observe scapular behaviour, shoulder elevation, elbow angle, wrist alignment, and bilateral symmetry.',
    findings: [
      'Scapular winging',
      'Shoulder elevation',
      'Elbow flare > 75°',
      'Wrist deviation under load',
      'Asymmetrical press',
    ],
    conditional: false,
  },
  { // Step 5
    id: 'pull',
    title: 'Pull Pattern',
    subtitle: 'Band or cable row at moderate resistance. Observe scapular timing, upper trap, end-range retraction, bicep engagement, and cervical position.',
    findings: [
      'Upper trap dominant',
      'Limited shoulder extension',
      'Bicep dominance',
      'Cervical protrusion on row',
    ],
    conditional: false,
  },
  { // Step 6
    id: 'hinge',
    title: 'Hip Hinge',
    subtitle: 'Bodyweight dowel hinge — 3-point contact (head, thoracic, sacrum). Observe from side. Note setup symmetry BEFORE movement begins.',
    findings: [
      'Lumbar flexion / rounding',
      'Knee dominant pattern',
      'Hip shift / asymmetry',
      'Lateral setup asymmetry',
      'Hyperextension at top',
    ],
    conditional: false,
  },
  { // Step 7 — Conditional
    id: 'cervical',
    title: 'Cervical Screen',
    subtitle: 'Run if: FHP present, client reports neck pain/headaches, or cervical protrusion observed on pull screen. STOP if arm tingling, dizziness, or bilateral symptoms appear.',
    findings: [
      'Cervical rotation restriction',
      'Cervical flexion/extension restriction',
    ],
    conditional: true,
    trigger: () => {
      const triggers = ['Forward head posture', 'Cervical protrusion on row'];
      return triggers.some(f => state.screens[f]);
    },
    callout: { type: 'warn', text: '🛑 RED FLAG: Stop and refer immediately if any finding reproduces arm pain, tingling, dizziness, or bilateral upper extremity symptoms.' },
  },
  { // Step 8 — Conditional
    id: 'shoulder',
    title: 'Shoulder Mobility',
    subtitle: 'Run if: rounded shoulders, arms fall on OHS, shoulder history on intake, or asymmetrical push/pull observed.',
    findings: [
      'GIRD — glenohumeral internal rotation deficit',
      'Limited overhead reach',
    ],
    conditional: true,
    trigger: () => {
      const triggers = ['Rounded shoulders / protracted scapulae', 'Arms fall forward', 'Elbow flare > 75°', 'Asymmetrical press'];
      return triggers.some(f => state.screens[f]);
    },
  },
];

const TOTAL_STEPS = 9; // 0=client, 1-6=core, 7=cervical, 8=shoulder, 9=results
let activeStep = 0; // 0-indexed into the flow

// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════

function render() {
  const scroll = document.getElementById('scrollArea');
  const btnNext = document.getElementById('btnNext');
  const btnBack = document.getElementById('btnBack');
  const stepLabel = document.getElementById('stepLabel');
  const screenTitle = document.getElementById('screenTitle');
  const bottomNav = document.getElementById('bottomNav');
  const progress = document.getElementById('progressBar');

  // Progress
  progress.style.width = `${((activeStep + 1) / (TOTAL_STEPS + 1)) * 100}%`;
  btnBack.style.display = activeStep === 0 ? 'none' : '';

  scroll.scrollTop = 0;

  if (activeStep === 0) {
    stepLabel.textContent = 'Step 1 of 9';
    screenTitle.textContent = 'Client Info';
    scroll.innerHTML = renderClientStep();
    btnNext.textContent = 'Begin Assessment →';
    btnNext.disabled = false;
    btnNext.className = 'btn-next';
    bottomNav.innerHTML = `
      <button class="btn-back" id="btnBack" style="display:none" onclick="prevStep()">←</button>
      <button class="btn-next" onclick="nextStep()">Begin Assessment →</button>
    `;
    bindChips();
  } else if (activeStep <= 8) {
    const screen = SCREENS[activeStep - 1];
    stepLabel.textContent = `Step ${activeStep + 1} of 9`;
    screenTitle.textContent = screen.title;
    scroll.innerHTML = renderScreenStep(screen);
    bottomNav.innerHTML = `
      <button class="btn-back" onclick="prevStep()">←</button>
      <button class="btn-next" onclick="nextStep()">Continue →</button>
    `;
    // Rebind chips
    bindChips();
  } else {
    // Results
    stepLabel.textContent = 'Results';
    screenTitle.textContent = 'Screen Output';
    scroll.innerHTML = renderResults();
    bottomNav.innerHTML = `
      <button class="btn-back" onclick="prevStep()">← Back</button>
      <button class="btn-next" onclick="startOver()">New Screen</button>
    `;
  }
}

function renderClientStep() {
  const c = state.client;
  return `
    <div class="section-label">Client Details</div>
    <div class="field">
      <label>Client Name</label>
      <input type="text" id="c_name" value="${c.name}" placeholder="Full name" oninput="state.client.name=this.value">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="c_date" value="${c.date || new Date().toISOString().slice(0,10)}" oninput="state.client.date=this.value">
    </div>
    <div class="field">
      <label>Training History</label>
      <input type="text" id="c_hist" value="${c.history}" placeholder="e.g. 2 years casual, just running" oninput="state.client.history=this.value">
    </div>
    <div class="field">
      <label>Primary Goal</label>
      <input type="text" id="c_goal" value="${c.goal}" placeholder="e.g. lose fat, build strength, reduce pain" oninput="state.client.goal=this.value">
    </div>
    <div class="divider"></div>
    <div class="section-label">Special Flags</div>
    <div class="chip-group">
      ${['Hypermobility (hEDS/HSD)', 'Acute pain today', 'Post-surgical', 'Pregnant/postpartum', 'Osteoporosis', 'Neurological'].map(f =>
        `<div class="chip ${state.client.flags.includes(f) ? 'on-flag' : ''}" data-flag="${f}">${f}</div>`
      ).join('')}
    </div>
    <div class="field">
      <label>Chief Complaint / Notes</label>
      <textarea id="c_complaints" placeholder="Pain location, symptoms, anything relevant..." oninput="state.client.complaints=this.value">${c.complaints}</textarea>
    </div>
  `;
}

function renderScreenStep(screen) {
  let html = '';

  html += `<p class="screen-sub">${screen.subtitle}</p>`;

  if (screen.callout) {
    html += `<div class="callout ${screen.callout.type === 'warn' ? 'warn' : ''}">${screen.callout.text}</div>`;
  }

  if (screen.conditional && screen.trigger && !screen.trigger()) {
    html += `<div class="callout">This screen was not triggered by earlier findings. You can still run it manually if clinically indicated.</div>`;
  }

  html += `<div class="section-label">Findings</div>`;
  html += `<p style="font-size:13px;color:var(--ink3);margin-bottom:14px;">Tap a finding to mark it. Then rate severity: <span style="color:var(--green)">✓ Clean</span> · <span style="color:var(--amber)">~ Compensating</span> · <span style="color:var(--red)">✗ Dysfunctional</span></p>`;

  screen.findings.forEach(finding => {
    const sel = state.screens[finding];
    const isSelected = !!sel;
    html += `
      <div class="finding-card" id="fc-${finding.replace(/[^a-z0-9]/gi,'_')}">
        <div class="finding-name" data-finding="${finding}" data-action="toggle" style="cursor:pointer">
          ${isSelected ? `<span style="color:var(--teal)">●</span>` : `<span style="color:var(--ink3)">○</span>`}
          &nbsp;${finding}
        </div>
        ${isSelected ? `
          <div class="severity-row">
            <button class="sev-btn ${sel.severity === 'clean' ? 'active-clean' : ''}" data-finding="${finding}" data-action="severity" data-sev="clean">✓ Clean</button>
            <button class="sev-btn ${sel.severity === 'comp' ? 'active-comp' : ''}" data-finding="${finding}" data-action="severity" data-sev="comp">~ Compensating</button>
            <button class="sev-btn ${sel.severity === 'dysfunc' ? 'active-dysfunc' : ''}" data-finding="${finding}" data-action="severity" data-sev="dysfunc">✗ Dysfunctional</button>
          </div>
          <textarea class="notes-field" placeholder="Notes (optional)..." data-finding="${finding}" data-action="note">${sel.notes || ''}</textarea>
        ` : ''}
      </div>
    `;
  });

  // Screen-level notes
  html += `
    <div class="divider"></div>
    <div class="section-label">Screen Notes</div>
    <textarea class="notes-field" style="min-height:72px" placeholder="General observations for this screen..." data-screen-id="${screen.id}">${(state.screenNotes || {})[screen.id] || ''}</textarea>
  `;

  // Last screen — show Generate button
  if (activeStep === 8) {
    html += `
      <div class="divider"></div>
      <div class="callout">
        <strong style="color:var(--ink)">Ready to generate.</strong> This will send all findings to Claude using your Clinical Decision Matrix to produce a prioritised corrective plan, program design flags, and a session summary.
      </div>
    `;
  }

  return html;
}

function renderResults() {
  const r = state.result;
  const hasResult = r.corrective || r.flags || r.summary;

  if (!hasResult) {
    return `
      <div class="spinner"><div class="spin"></div> Generating from matrix…</div>
    `;
  }

  return `
    <div class="result-tabs">
      <div class="result-tab active" onclick="switchTab(this,'corrective')">Corrective Plan</div>
      <div class="result-tab" onclick="switchTab(this,'flags')">Program Flags</div>
      <div class="result-tab" onclick="switchTab(this,'summary')">Summary</div>
    </div>
    <div class="result-panel active" id="tab-corrective">
      <div class="result-text" id="txt-corrective">${formatResult(r.corrective)}</div>
    </div>
    <div class="result-panel" id="tab-flags">
      <div class="result-text" id="txt-flags">${formatResult(r.flags)}</div>
    </div>
    <div class="result-panel" id="tab-summary">
      <div class="result-text" id="txt-summary">${formatResult(r.summary)}</div>
    </div>
    <div class="action-row">
      <button class="action-btn" onclick="copyAll()">Copy All</button>
      <button class="action-btn primary" onclick="sendEmail()">Send to Email ↗</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════════

function toggleClientFlag(f) {
  const i = state.client.flags.indexOf(f);
  if (i > -1) state.client.flags.splice(i, 1);
  else state.client.flags.push(f);
  render();
}

function toggleFinding(finding) {
  if (state.screens[finding]) {
    delete state.screens[finding];
  } else {
    state.screens[finding] = { severity: 'comp', notes: '' };
  }
  render();
}

function setSeverity(finding, sev) {
  if (state.screens[finding]) state.screens[finding].severity = sev;
  render();
}

function setNote(finding, val) {
  if (state.screens[finding]) state.screens[finding].notes = val;
}

function bindChips() {
  // Finding name cards — use data-finding to avoid inline string escaping issues
  document.querySelectorAll('[data-finding]').forEach(el => {
    const finding = el.dataset.finding;
    const action  = el.dataset.action;
    const sev     = el.dataset.sev;
    if (action === 'toggle') {
      el.addEventListener('click', () => toggleFinding(finding));
    } else if (action === 'severity') {
      el.addEventListener('click', () => setSeverity(finding, sev));
    } else if (action === 'note') {
      el.addEventListener('input', () => setNote(finding, el.value));
    }
  });
  // Client flag chips
  document.querySelectorAll('[data-flag]').forEach(el => {
    el.addEventListener('click', () => toggleClientFlag(el.dataset.flag));
  });
  // Screen notes textarea
  document.querySelectorAll('[data-screen-id]').forEach(el => {
    const id = el.dataset.screenId;
    el.addEventListener('input', () => {
      state.screenNotes = state.screenNotes || {};
      state.screenNotes[id] = el.value;
    });
  });
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.result-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.result-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tabId).classList.add('active');
}

function formatResult(text) {
  if (!text) return '<span style="color:var(--ink3)">No output</span>';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm, '<strong style="color:var(--ink);font-size:15px">$1</strong>')
    .replace(/\n/g, '<br>');
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════

function nextStep() {
  // Save client fields on step 0
  if (activeStep === 0) {
    state.client.name = document.getElementById('c_name')?.value || '';
    state.client.date = document.getElementById('c_date')?.value || '';
    state.client.history = document.getElementById('c_hist')?.value || '';
    state.client.goal = document.getElementById('c_goal')?.value || '';
    state.client.complaints = document.getElementById('c_complaints')?.value || '';
  }

  if (activeStep === 8) {
    // Generate
    activeStep = 9;
    render();
    generate();
    return;
  }

  activeStep = Math.min(activeStep + 1, 9);
  render();
}

function prevStep() {
  activeStep = Math.max(activeStep - 1, 0);
  render();
}

function startOver() {
  Object.assign(state, {
    step: 0, client: { name:'', date:'', history:'', goal:'', flags:[], complaints:'' },
    screens: {}, screenNotes: {}, result: { corrective:'', flags:'', summary:'' },
  });
  activeStep = 0;
  render();
}

// ═══════════════════════════════════════════════════════════════════
// GENERATE — CALLS CLAUDE WITH EMBEDDED MATRIX DATA
// ═══════════════════════════════════════════════════════════════════

async function generate() {
  const key = localStorage.getItem('apiKey');
  if (!key) { openSettings(); return; }

  // Build findings summary
  const findings = Object.entries(state.screens);
  if (findings.length === 0) {
    state.result = { corrective: 'No findings were recorded.', flags: 'No findings were recorded.', summary: 'Assessment completed with no findings.' };
    render();
    return;
  }

  // Build compact matrix reference — only findings present in this screen
  let matrixRef = '';
  findings.forEach(([name, data]) => {
    const m = MATRIX[name];
    if (m) {
      matrixRef += `\n\n### ${name} [${data.severity.toUpperCase()}]`;
      if (data.notes) matrixRef += `\nClinician notes: ${data.notes}`;
      matrixRef += `\nSMR: ${m.smr}`;
      matrixRef += `\nLengthen: ${m.len}`;
      matrixRef += `\nActivate: ${m.act}`;
      matrixRef += `\nExercises: ${m.ex}`;
      matrixRef += `\nFlags: ${m.fl}`;
    }
  });

  const hypermobile = state.client.flags.includes('Hypermobility (hEDS/HSD)');

  const systemPrompt = `You are a clinical exercise prescriber for a personal trainer and licensed massage therapist. You generate precise, evidence-informed corrective prescriptions based on movement screen findings and a Clinical Decision Matrix.

SEVERITY DEFINITIONS:
- CLEAN: finding present but mild — note in program, address in warm-up
- COMP (Compensating): moderate — include in accessory block, direct corrective work
- DYSFUNC (Dysfunctional): significant — address before loading that pattern, may require regression

${hypermobile ? `HYPERMOBILITY RULES (NON-NEGOTIABLE — client has hEDS/HSD or suspected hypermobility):
- NEVER prescribe passive end-range stretching
- Prioritise isometric and slow-eccentric exercises only
- Add "HYPERMOBILITY: avoid end-range loading" to all relevant flags
- Replace any passive stretches with active stability work
- Flag every exercise that requires modification
` : ''}

OUTPUT FORMAT — produce exactly three sections separated by === markers:
=== CORRECTIVE PLAN ===
List 4–8 prioritised exercises in kinetic chain order (ankle → hip → thoracic → cervical/shoulder).
For each exercise:
**[Exercise Name]** — [Sets]×[Reps/Duration] — [One coaching cue]

=== PROGRAM DESIGN FLAGS ===
6–10 specific do/don't statements tied to findings. Include severity context.
Format: • [DO/DO NOT/FLAG]: [specific instruction tied to a finding]

=== SCREEN SUMMARY ===
2–3 sentences. Clinical record language. State key findings, primary drivers, and immediate program implications.`;

  const userPrompt = `CLIENT: ${state.client.name || 'Unknown'}
Date: ${state.client.date || 'Today'}
Training history: ${state.client.history || 'Not provided'}
Goal: ${state.client.goal || 'Not specified'}
Complaints: ${state.client.complaints || 'None'}
Special flags: ${state.client.flags.join(', ') || 'None'}

MOVEMENT SCREEN FINDINGS WITH MATRIX DATA:
${matrixRef}

Generate the corrective plan, program design flags, and screen summary using the matrix data above. Use the exact exercise names from the matrix. Weight your corrective priorities by severity — DYSFUNC findings take precedence.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err}`);
    }

    const data = await res.json();
    const text = data.content[0].text;

    // Parse sections
    const corrective = (text.match(/=== CORRECTIVE PLAN ===([\s\S]*?)(?:=== PROGRAM DESIGN FLAGS ===|$)/) || ['', ''])[1].trim();
    const flags      = (text.match(/=== PROGRAM DESIGN FLAGS ===([\s\S]*?)(?:=== SCREEN SUMMARY ===|$)/) || ['', ''])[1].trim();
    const summary    = (text.match(/=== SCREEN SUMMARY ===([\s\S]*)$/) || ['', ''])[1].trim();

    state.result = { corrective, flags, summary };
    render();

  } catch (e) {
    state.result = {
      corrective: `Error: ${e.message}`,
      flags: 'Generation failed — check API key in Settings.',
      summary: '',
    };
    render();
  }
}

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════

function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('apiKey') || '';
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (k) { localStorage.setItem('apiKey', k); }
  closeSettings();
}

function copyAll() {
  const r = state.result;
  const text = `MOVEMENT SCREEN — ${state.client.name} — ${state.client.date}\n\n=== CORRECTIVE PLAN ===\n${r.corrective}\n\n=== PROGRAM DESIGN FLAGS ===\n${r.flags}\n\n=== SCREEN SUMMARY ===\n${r.summary}`;
  navigator.clipboard.writeText(text).catch(() => {});
}

function sendEmail() {
  const r = state.result;
  const name = state.client.name || 'Client';
  const date = state.client.date || new Date().toISOString().slice(0,10);
  const subject = encodeURIComponent(`Movement Screen — ${name} — ${date}`);
  const body = encodeURIComponent(`CORRECTIVE PLAN\n\n${r.corrective}\n\nPROGRAM DESIGN FLAGS\n\n${r.flags}\n\nSCREEN SUMMARY\n\n${r.summary}`);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

// ── Init ──────────────────────────────────────────────────────────
state.client.date = new Date().toISOString().slice(0, 10);
render();
</script>
